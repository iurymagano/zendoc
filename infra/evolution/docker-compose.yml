# Evolution API v2 (self-hosted) + Postgres + Redis
#
# Uso:
#   cd infra/evolution
#   cp .env.example .env   # e preencha os valores
#   docker compose up -d
#
# A API sobe em http://localhost:8080 (porta configurável em EVOLUTION_PORT).
# A AUTHENTICATION_API_KEY é a chave global usada pelo IAzen (EVOLUTION_API_KEY).

services:
  evolution-api:
    # Imagem oficial atual: evoapicloud/evolution-api (a antiga atendai parou no 2.2.3).
    # v2.3.7 = última free com correções de LID (a 2.4.x passou a exigir licença paga).
    # Tags: https://hub.docker.com/r/evoapicloud/evolution-api/tags
    image: ${EVOLUTION_IMAGE:-evoapicloud/evolution-api:v2.3.7}
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - '${EVOLUTION_PORT:-8080}:8080'
    environment:
      # URL pública por onde a Evolution é alcançada (use a URL do túnel/domínio)
      SERVER_URL: ${SERVER_URL:-http://localhost:8080}

      # Autenticação — esta é a EVOLUTION_API_KEY do IAzen
      AUTHENTICATION_API_KEY: ${AUTHENTICATION_API_KEY}

      # Banco (Postgres)
      DATABASE_ENABLED: 'true'
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/evolution?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: evolution
      DATABASE_SAVE_DATA_INSTANCE: 'true'
      DATABASE_SAVE_DATA_NEW_MESSAGE: 'true'
      DATABASE_SAVE_MESSAGE_UPDATE: 'true'
      DATABASE_SAVE_DATA_CONTACTS: 'true'
      DATABASE_SAVE_DATA_CHATS: 'true'

      # Cache (Redis)
      CACHE_REDIS_ENABLED: 'true'
      CACHE_REDIS_URI: redis://redis:6379/6
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: 'false'
      CACHE_LOCAL_ENABLED: 'false'

      # Integração usada pelas instâncias criadas via API
      CONFIG_SESSION_PHONE_CLIENT: IAzen
      CONFIG_SESSION_PHONE_NAME: Chrome
      # Versão do WhatsApp Web anunciada pelo Baileys. Se ficar desatualizada,
      # o WhatsApp recusa o handshake e o QR nunca é gerado (loop de reconexão).
      # Valor atual em: https://github.com/WhiskeySockets/Baileys/blob/master/src/Defaults/baileys-version.json
      CONFIG_SESSION_PHONE_VERSION: ${WA_VERSION:-2.3000.1035194821}
    volumes:
      - evolution_instances:/evolution/instances

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: evolution
    volumes:
      - evolution_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - evolution_redis:/data

volumes:
  evolution_instances:
  evolution_postgres:
  evolution_redis:
